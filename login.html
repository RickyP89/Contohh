<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Login Wisata</title>
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f2f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login {
    width: 350px;
    background: white;
    padding: 35px;
    border-radius: 22px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.login h1 {
    text-align: center;
    margin-bottom: 10px;
}

.login p {
    text-align: center;
    color: gray;
    margin-bottom: 25px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

input:focus {
    border-color: #2563eb;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2E8B57;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 20px;
}

button:hover {
    background: #1d4e;
}

.daftar {
    text-align: center;
}

.daftar a {
    text-decoration: none;
    color: #2E8B57;
    font-weight: bold;
}    
</style>
<body>
  <div class="login">
    <h1>Welcome Back</h1>
    <p>Masuk akun untuk melanjutkan</p>
    <label>Username</label><br>
    <input type="text" name="username" id="username" placeholder="Masukkan Username Anda" required><br>
    <label>Password</label><br>
    <input type="password" name="pass" id="pass" placeholder="Masukkan Password Anda" required><br>
    
    <button type="submit">Masuk</button><br>
    <p class="daftar">Belum punya akun? <a href="#">Daftar</a></p>
  </div>
  <script>
      document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if (username === "admin" && password === "1234") {
    window.location.href = "index.html"; 
  } else {
    alert("Username atau password salah!");
  }
});
  </script>
</body>
</html>
