<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Login Wisata</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login">
    <h1>Welcome Back</h1>
    <p>Masuk akun untuk melanjutkan</p>
    <label>Username</label><br>
    <input type="text" name="username" id="username" placeholder="Masukkan Username Anda" required><br>
    <label>Password</label><br>
    <input type="password" name="pass" id="pass" placeholder="Masukkan Password Anda" required><br>
    
    <button>Masuk</button><br>
    <p class="daftar">Belum punya akun? <a href="#">Daftar</a></p>
  </div>
</body>
</html>
