<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Login Wisata</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<style>
  :root {
    --primary:       #e8622a;
    --primary-dark:  #c44e1c;
    --dark:          #0d1b2a;
    --font-head:     'Playfair Display', Georgia, serif;
    --font-body:     'Lato', sans-serif;
    --radius:        16px;
}

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: var(--font-body);
}

body {
    background: linear-gradient(135deg, var(--dark), #1a2e42);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login {
    width: 350px;
    background: white;
    padding: 35px;
    border-radius: var(--radius);
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
}

.login h1 {
    font-family: var(--font-head);
    text-align: center;
    margin-bottom: 10px;
    color: var(--dark);
}

.login p {
    text-align: center;
    color: gray;
    margin-bottom: 25px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: var(--dark);
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s ease;
}

input:focus {
    border-color: var(--primary);
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--primary);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 20px;
    transition: background 0.2s ease;
}

button:hover {
    background: var(--primary-dark);
}

.daftar {
    text-align: center;
}

.daftar a {
    text-decoration: none;
    color: var(--primary);
    font-weight: bold;
}    
</style>
<body>
  <div class="login">
    <h1>Welcome Back</h1>
    <p>Masuk akun untuk melanjutkan</p>
    <form id="loginForm">
      <label>Username</label><br>
      <input type="text" name="username" id="username" placeholder="Masukkan Username Anda" required><br>
      <label>Password</label><br>
      <input type="password" name="pass" id="password" placeholder="Masukkan Password Anda" required><br>

      <button type="submit">Masuk</button><br>
    </form>
    <p class="daftar">Belum punya akun? <a href="#">Daftar</a></p>
    <script>
      document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if (username === "1234" && password === "1234") {
    window.location.href = "index.html"; 
  } else {
    alert("Username atau password salah!");
  }
});
    </script>
  </div>
</body>
</html>
